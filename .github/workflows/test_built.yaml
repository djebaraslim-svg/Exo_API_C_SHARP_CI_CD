
name: CI/CD .NET

on:
  push:
    branches: [ main ]

jobs:
  buildApi:
    runs-on: ubuntu-latest
    steps:
      - name: Verification des fichiers du runner (linux)
        run: ls -a -l

      - name: Clone du projet dans le runner (checkout)
        uses: actions/checkout@v6

      - name: Vérification des fichiers après l'action "checkout"
        run: ls -a -l

      - name: Installer .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      
      - name: Restore
        run: dotnet restore

      - name: Build du projet
        run: dotnet build 
      
      - name: Lancer les tests unitaires
        run: dotnet test


      - name: Message succès
        run: echo "Pipeline réussi"

      - name: Mailage en cas de foirage du testage
        if: failure()
        uses: JaSiLez/smtp-notifier@main
        with:
          server_address: ${{ vars.SMTP_SERVER }}
          server_port: ${{ vars.SMTP_PORT }}
          secure: true
          from: ${{ secrets.FROM_EMAIL }}
          to: okok@yopmail.com
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Deployment fail !"
          html_body: "<h1>Et merde ! Ca a foiré !</h1>"

      - name: Buildation du code TS vers le JS
        run: npm run build

      - name: Verifier le resultat de la buildation (Projet "Hello World")
        run: npm run start
